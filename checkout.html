<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - AutoParts Pro</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">🔧 AutoParts<span>Pro</span></a>
    <span>🔒 Secure Checkout</span>
  </div>
</header>

<div class="container">
  <h1>Checkout</h1>
  <div class="checkout-layout">
    <form id="checkoutForm" class="checkout-form">
      <h2>Shipping Information</h2>
      <div class="form-row">
        <input type="text" name="firstName" placeholder="First Name" required>
        <input type="text" name="lastName" placeholder="Last Name" required>
      </div>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="phone" placeholder="Phone" required>
      <input type="text" name="address" placeholder="Street Address" required>
      <div class="form-row">
        <input type="text" name="city" placeholder="City" required>
        <input type="text" name="state" placeholder="State" required>
        <input type="text" name="zip" placeholder="ZIP" required>
      </div>

      <h2>Billing Information</h2>
      <label><input type="checkbox" id="sameAsBilling" checked> Same as shipping</label>
      <div id="billingFields" style="display:none;">
        <input type="text" name="billAddress" placeholder="Billing Address">
        <div class="form-row">
          <input type="text" name="billCity" placeholder="City">
          <input type="text" name="billState" placeholder="State">
          <input type="text" name="billZip" placeholder="ZIP">
        </div>
      </div>

      <h2>Payment (Stripe Secure)</h2>
      <div class="payment-box">
        <input type="text" name="cardName" placeholder="Name on Card" required>
        <input type="text" name="cardNumber" placeholder="Card Number (4242 4242 4242 4242)" maxlength="19" required>
        <div class="form-row">
          <input type="text" name="expiry" placeholder="MM/YY" maxlength="5" required>
          <input type="text" name="cvc" placeholder="CVC" maxlength="4" required>
        </div>
        <p class="secure-note">🔒 Your payment information is encrypted and processed securely via Stripe.</p>
      </div>

      <button type="submit" class="btn-primary btn-large">Place Order</button>
    </form>

    <aside class="order-summary" id="orderSummary"></aside>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
