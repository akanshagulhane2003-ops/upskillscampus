<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop Parts - AutoParts Pro</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="header">
  <div class="container header-inner">
    <a href="index.html" class="logo">🔧 AutoParts<span>Pro</span></a>
    <div class="search-bar">
      <input type="text" id="globalSearch" placeholder="Search parts...">
      <button onclick="performSearch()">🔍</button>
    </div>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="products.html">Shop</a>
      <a href="account.html">Account</a>
      <a href="cart.html" class="cart-link">Cart <span id="cartCount" class="cart-count">0</span></a>
    </nav>
  </div>
</header>

<div class="container shop-layout">
  <aside class="sidebar">
    <h3>Filters</h3>
    <div class="filter-group">
      <h4>Category</h4>
      <div id="catFilters"></div>
    </div>
    <div class="filter-group">
      <h4>Price Range</h4>
      <label>Min: $<input type="number" id="minPrice" value="0"></label>
      <label>Max: $<input type="number" id="maxPrice" value="2000"></label>
    </div>
    <div class="filter-group">
      <h4>Brand</h4>
      <div id="brandFilters"></div>
    </div>
    <div class="filter-group">
      <h4>Rating</h4>
      <select id="ratingFilter">
        <option value="0">All</option>
        <option value="4">4★ & up</option>
        <option value="3">3★ & up</option>
      </select>
    </div>
    <button onclick="applyFilters()" class="btn-primary">Apply Filters</button>
    <button onclick="clearFilters()" class="btn-secondary">Clear</button>
  </aside>

  <main class="shop-main">
    <div class="shop-header">
      <h1 id="shopTitle">All Products</h1>
      <select id="sortBy" onchange="applyFilters()">
        <option value="featured">Featured</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Top Rated</option>
        <option value="new">Newest</option>
      </select>
    </div>
    <div id="productList" class="product-grid"></div>
  </main>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>initProductsPage();</script>
</body>
</html>
